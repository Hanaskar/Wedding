<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wedding of Akbari & Wahidah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'cinzel': ['"Cinzel Decorative"', 'serif'],
                        'poppins': ['Poppins', 'sans-serif'],
                        'great-vibes': ['"Great Vibes"', 'cursive'],
                    },
                    colors: {
                        'dark-bg': '#0a0a0a',
                        'light-bg': '#F5F2EB', 
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body.locked { overflow: hidden; }
        .theme-dark { color: #ffffff; }
        .theme-light { color: #1a1a1a; }
        #global-bg {
            position: fixed; inset: 0; z-index: -10;
            background-image: url('https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&q=80');
            background-size: cover; background-position: center; transition: all 1s ease-in-out;
        }
        .bg-overlay { position: absolute; inset: 0; transition: background-color 1s ease; backdrop-filter: blur(8px); }
        .theme-dark .bg-overlay { background-color: rgba(10, 10, 10, 0.90); }
        .theme-light .bg-overlay { background-color: rgba(245, 242, 235, 0.88); }
        .noise-overlay { position: fixed; inset: 0; z-index: -5; opacity: 0.05; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); }
        .glass-card { background: rgba(25, 25, 25, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); transition: all 1s ease; }
        .theme-light .glass-card { background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(0, 0, 0, 0.05); }
        .img-bw { filter: grayscale(100%); transition: filter 0.8s ease; object-fit: cover; }
        .img-bw:hover { filter: grayscale(0%); }
        .animate-spin-slow { animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .form-input-custom { background-color: transparent !important; border: 1px solid currentColor; opacity: 0.4; color: currentColor; transition: all 0.3s ease; }
        .form-input-custom:focus { opacity: 0.9; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: currentColor; border-radius: 10px; }
    </style>
</head>
<body class="font-poppins theme-dark transition-colors duration-700 locked relative min-h-screen">

    <div id="global-bg"><div class="bg-overlay"></div></div>
    <div class="noise-overlay"></div>

    <div class="fixed bottom-6 right-6 z-50 flex flex-col gap-4">
        <button onclick="toggleTheme()" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center shadow-2xl border border-black/10"><i class="fa-solid fa-circle-half-stroke"></i></button>
        <button onclick="toggleMusic()" class="w-12 h-12 bg-black text-white rounded-full flex items-center justify-center shadow-2xl border border-white/20 hidden" id="music-container"><i class="fa-solid fa-compact-disc" id="music-icon"></i></button>
    </div>
    <audio id="wedding-music" loop src="https://www.dropbox.com/scl/fi/60flvsvw1mykghel4lcet/Kasih-Aera.mp3?rlkey=wehims3r2337ab73mfsscvkkx&st=6i9rp5tr&raw=1"></audio>

    <section id="cover" class="fixed inset-0 w-full h-full z-40 bg-[#0a0a0a] transition-transform duration-[1500ms] ease-in-out">
        <div class="relative z-10 h-full flex flex-col items-center justify-center text-white text-center px-6">
            <h1 class="font-cinzel text-5xl md:text-7xl mb-4 tracking-widest">Akbari & Wahidah</h1>
            <div class="p-10 bg-white/5 backdrop-blur-md border border-white/20 max-w-sm w-full mt-10">
                <h4 class="text-2xl font-bold mb-8" id="guest-name">Nama Tamu</h4>
                <button onclick="openInvitation()" class="w-full py-4 bg-white text-black font-bold uppercase text-[10px] tracking-[0.3em]">Buka Undangan</button>
            </div>
        </div>
    </section>

    <main id="main-content" class="hidden opacity-0 transition-opacity duration-1000 relative z-10">
        <section class="py-32 px-6 text-center">
            <div class="max-w-4xl mx-auto glass-card p-12" data-aos="fade-up">
                <h2 class="font-cinzel text-2xl mb-8 uppercase tracking-widest">Assalamu’alaikum</h2>
                <p class="italic opacity-90 leading-loose">"Dan di antara tanda-tanda kekuasaan-Nya ialah Dia menciptakan untukmu pasangan hidup dari jenismu sendiri..." (QS. AR-RUM: 21)</p>
            </div>
        </section>

        <section id="rsvp" class="py-24 px-6 max-w-4xl mx-auto">
            <h2 class="font-cinzel text-3xl text-center mb-12 tracking-widest uppercase" data-aos="fade-up">Ucapan & Doa</h2>
            <div class="glass-card p-10 relative" data-aos="fade-up">
                <form id="wish-form" class="space-y-6">
                    <input type="text" id="wish-name" class="form-input-custom w-full px-4 py-3 text-sm rounded-sm" placeholder="NAMA ANDA" required>
                    <select id="wish-attendance" class="form-input-custom w-full px-4 py-3 text-sm rounded-sm" required>
                        <option value="" disabled selected>KONFIRMASI KEHADIRAN</option>
                        <option value="Hadir">Hadir</option>
                        <option value="Tidak Hadir">Tidak Hadir</option>
                    </select>
                    <textarea id="wish-message" rows="4" class="form-input-custom w-full px-4 py-3 text-sm rounded-sm" placeholder="KETIK UCAPAN & DOA..." required></textarea>
                    <button type="submit" id="submit-wish-btn" class="w-full py-5 bg-[#1a1a1a] text-white font-bold uppercase text-[10px] tracking-[0.5em]">Kirim Pesan</button>
                </form>

                <div id="wishes-container" class="mt-16 space-y-6 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                    <p class="text-xs opacity-50 italic text-center py-4">Memuat ucapan...</p>
                </div>
            </div>
        </section>

        <footer class="py-20 text-center">
            <p class="font-cinzel font-bold tracking-[0.8em] uppercase">Akbari & Wahidah</p>
            <p class="text-[8px] tracking-[0.6em] mt-10 opacity-50">© HANASKAR.ID</p>
        </footer>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
        function toggleTheme() { document.body.classList.toggle('theme-light'); document.body.classList.toggle('theme-dark'); }
        function openInvitation() {
            document.body.classList.remove('locked');
            document.getElementById('cover').style.transform = 'translateY(-100%)';
            const main = document.getElementById('main-content');
            main.classList.remove('hidden');
            setTimeout(() => { main.classList.remove('opacity-0'); AOS.refresh(); }, 100);
            document.getElementById('music-container').classList.remove('hidden');
            toggleMusic(true);
        }
        let isPlaying = false;
        const audio = document.getElementById('wedding-music');
        function toggleMusic(forcePlay = false) {
            if (forcePlay || !isPlaying) { audio.play(); isPlaying = true; document.getElementById('music-icon').classList.add('animate-spin-slow'); }
            else { audio.pause(); isPlaying = false; document.getElementById('music-icon').classList.remove('animate-spin-slow'); }
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // Konfigurasi dari gambar yang kamu kirim
        const firebaseConfig = {
          apiKey: "AIzaSyDE_J3Kms9k5wO8p4-6_Z9xO1kL9mI-j9A", // Sesuaikan API Key lengkapmu di sini
          authDomain: "wedding-abay.firebaseapp.com",
          projectId: "wedding-abay",
          storageBucket: "wedding-abay.firebasestorage.app",
          messagingSenderId: "931238475253",
          appId: "1:931238475253:web:75c4f6b86e069152b12345" // Sesuaikan App ID lengkapmu di sini
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => { if (user) { loadCommentsRealtime(); } else { signInAnonymously(auth); } });

        function loadCommentsRealtime() {
            const q = query(collection(db, 'comments'), orderBy('timestamp', 'desc'));
            
            // FUNGSI REALTIME onSnapshot
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('wishes-container');
                container.innerHTML = '';
                snapshot.forEach(doc => {
                    const c = doc.data();
                    const div = document.createElement('div');
                    div.className = 'flex gap-4 p-4 glass-card rounded-lg';
                    div.innerHTML = `
                        <div class="flex-1">
                            <h5 class="font-bold text-[10px] uppercase">${c.name} - <span class="text-xs opacity-50">${c.attendance}</span></h5>
                            <p class="text-sm italic mt-2">"${c.message}"</p>
                        </div>
                    `;
                    container.appendChild(div);
                });
            });
        }

        document.getElementById('wish-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-wish-btn');
            btn.disabled = true; btn.innerText = 'MENGIRIM...';

            try {
                await addDoc(collection(db, 'comments'), {
                    name: document.getElementById('wish-name').value,
                    message: document.getElementById('wish-message').value,
                    attendance: document.getElementById('wish-attendance').value,
                    timestamp: serverTimestamp()
                });
                document.getElementById('wish-form').reset();
            } catch(err) { alert("Gagal mengirim pesan."); }
            finally { btn.disabled = false; btn.innerText = 'KIRIM PESAN'; }
        });
    </script>
</body>
</html>
